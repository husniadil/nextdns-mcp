name: Version Guard

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  check-labels:
    name: Verify Release Labels
    runs-on: ubuntu-latest
    steps:
      - name: Validate Labels
        run: |
          # Use exact matching against the labels array
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          echo "Current labels: $LABELS"
          
          # Check for mutual exclusivity and existence
          HAS_BUMP_PATCH=$(echo "$LABELS" | grep -q '"bump-patch"' && echo true || echo false)
          HAS_BUMP_MINOR=$(echo "$LABELS" | grep -q '"bump-minor"' && echo true || echo false)
          HAS_BUMP_MAJOR=$(echo "$LABELS" | grep -q '"bump-major"' && echo true || echo false)
          HAS_NO_RELEASE=$(echo "$LABELS" | grep -q '"no-release"' && echo true || echo false)
          
          BUMP_COUNT=0
          [ "$HAS_BUMP_PATCH" = "true" ] && BUMP_COUNT=$((BUMP_COUNT+1))
          [ "$HAS_BUMP_MINOR" = "true" ] && BUMP_COUNT=$((BUMP_COUNT+1))
          [ "$HAS_BUMP_MAJOR" = "true" ] && BUMP_COUNT=$((BUMP_COUNT+1))
          
          if [ "$HAS_NO_RELEASE" = "true" ] && [ $BUMP_COUNT -gt 0 ]; then
            echo "❌ Error: 'no-release' and 'bump-*' labels are mutually exclusive. Please remove one."
            exit 1
          fi
          
          if [ $BUMP_COUNT -gt 1 ]; then
            echo "❌ Error: Multiple 'bump-*' labels found. Please use only one."
            exit 1
          fi
          
          if [ "$HAS_NO_RELEASE" = "false" ] && [ $BUMP_COUNT -eq 0 ]; then
            echo "❌ Error: No release label found!"
            echo "Please add one of the following labels to this PR:"
            echo "- bump-patch"
            echo "- bump-minor"
            echo "- bump-major"
            echo "- no-release"
            exit 1
          fi
          
          echo "✅ Valid release label configuration found."

  check-sync:
    name: Verify Version Sync
    runs-on: ubuntu-latest
    needs: check-labels
    steps:
      - name: Check for no-release label
        id: bypass
        run: |
          HAS_LABEL="${{ contains(github.event.pull_request.labels.*.name, 'no-release') }}"
          echo "has_label=$HAS_LABEL" >> $GITHUB_OUTPUT
          if [ "$HAS_LABEL" = "true" ]; then
            echo "✅ 'no-release' label found. Skipping version sync check."
          fi

      - name: Checkout main (baseline)
        if: steps.bypass.outputs.has_label != 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout PR branch
        if: steps.bypass.outputs.has_label != 'true'
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Validate Versions
        if: steps.bypass.outputs.has_label != 'true'
        run: |
          set -euo pipefail
          echo "### 🔍 Extracting and Validating Versions..."
          
          python3 << 'PY'
          import re
          import sys
          import tomllib
          from pathlib import Path

          def get_pyproject_v(root):
              p = Path(root) / "pyproject.toml"
              with p.open("rb") as f:
                  return tomllib.load(f)["project"]["version"]

          def get_init_v(root):
              p = Path(root) / "src/nextdns_mcp/__init__.py"
              content = p.read_text()
              match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', content)
              return match.group(1) if match else None

          def get_docker_v(root):
              p = Path(root) / "Dockerfile"
              content = p.read_text()
              match = re.search(r'LABEL org\.opencontainers\.image\.version=["\']([^"\']+)["\']', content)
              return match.group(1) if match else None

          def is_greater(v1, v2):
              # Simple semver comparison for MAJOR.MINOR.PATCH
              t1 = [int(x) for x in v1.split('.')]
              t2 = [int(x) for x in v2.split('.')]
              return t1 > t2

          try:
              main_v = get_pyproject_v("main")
              pr_py = get_pyproject_v("pr")
              pr_init = get_init_v("pr")
              pr_docker = get_docker_v("pr")
          except Exception as e:
              print(f"❌ Error extracting versions: {e}")
              sys.exit(1)

          print(f"Main Version: {main_v}")
          print(f"PR pyproject.toml: {pr_py}")
          print(f"PR __init__.py: {pr_init}")
          print(f"PR Dockerfile: {pr_docker}")

          errors = []
          if not is_greater(pr_py, main_v):
              errors.append(f"Version in pyproject.toml ({pr_py}) must be greater than main ({main_v}).")
          
          if pr_py != pr_init:
              errors.append(f"Mismatch: pyproject.toml ({pr_py}) != __init__.py ({pr_init})")
          
          if pr_py != pr_docker:
              errors.append(f"Mismatch: pyproject.toml ({pr_py}) != Dockerfile ({pr_docker})")

          if errors:
              print("\n🚨 Version Guard Failed:")
              for err in errors:
                  print(f"  - {err}")
              print("\nAdd a 'bump-*' label to auto-fix or update manually.")
              sys.exit(1)

          print("\n✅ All version strings are synced and incremented.")
          PY
